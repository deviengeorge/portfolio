name: CI/CD

on:
  push:
    branches: [main]

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run typecheck

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Send Telegram message
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          COMMIT_URL="${{ github.event.head_commit.url }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"

          TEXT="✅ *Portfolio CI passed*%0A%0A*Commit:* ${COMMIT_MSG}%0A*Author:* ${AUTHOR}%0A*Branch:* ${{ github.ref_name }}%0A[View commit](${COMMIT_URL})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${TEXT}" \
            -d parse_mode=Markdown

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [check, notify]
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X POST "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
